name: Generate Profile Assets

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate snake animations
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
            dist/ocean.gif?color_snake=orange&color_dots=#bfd6f6,#8dbdff,#64a1f4,#4b91f1,#3c7dd9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate stats card (dark)
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&hide_border=true&theme=dark
          path: dist/stats-dark.svg
          token: ${{ secrets.TOKEN }}

      - name: Generate stats card (light)
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&hide_border=true&theme=default
          path: dist/stats-light.svg
          token: ${{ secrets.TOKEN }}

      - name: Generate top languages card (dark)
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=8&hide_border=true&theme=dark
          path: dist/top-langs-dark.svg
          token: ${{ secrets.TOKEN }}

      - name: Generate top languages card (light)
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=8&hide_border=true&theme=default
          path: dist/top-langs-light.svg
          token: ${{ secrets.TOKEN }}

      - name: Download streak stats SVGs
        run: |
          curl -o dist/streak-dark.svg --max-time 120 --retry 3 --retry-delay 5 \
            "https://streak-stats.demolab.com?user=${{ github.repository_owner }}&theme=dark"
          curl -o dist/streak-light.svg --max-time 120 --retry 3 --retry-delay 5 \
            "https://streak-stats.demolab.com?user=${{ github.repository_owner }}&theme=default"

      - name: Commit to main
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add dist/
          git diff --quiet --cached || git commit -m "Update profile assets [skip ci]"
          git push
